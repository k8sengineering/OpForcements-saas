apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: opforcements-meridian
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  - host: meridian.opforcements.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
